  <div id="root"></div>

  <!-- Red de seguridad: si algo lanza un error que deja la app en blanco,
       lo mostramos en pantalla con un botón para limpiar cache y recargar. -->
  <script>
    window.__bootError = function (msg) {
      var root = document.getElementById('root');
      if (!root || root.children.length > 0) return; // ya renderizó algo, no molestar
      root.innerHTML =
        '<div style="max-width:560px;margin:80px auto;padding:32px;font-family:Inter,system-ui,sans-serif;color:#1a2240">' +
        '<div style="font-size:22px;font-weight:700;margin-bottom:12px">No se pudo cargar la plataforma</div>' +
        '<div style="font-size:14px;color:#4a5275;margin-bottom:20px">Esto suele resolverse limpiando el caché del navegador.</div>' +
        '<button onclick="(async()=>{try{localStorage.clear();sessionStorage.clear();if(window.caches){var k=await caches.keys();for(var i=0;i<k.length;i++)await caches.delete(k[i])}}catch(e){};location.reload(true)})()" ' +
        'style="background:#0066CC;color:#fff;border:0;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer">Limpiar y recargar</button>' +
        '<div style="font-size:11px;color:#7a82a0;margin-top:24px;word-break:break-all">' + (msg||'') + '</div>' +
        '</div>';
    };
    window.addEventListener('error', function (e) {
      window.__bootError(e.message + (e.filename ? ' @ ' + e.filename.split('/').pop() + ':' + e.lineno : ''));
    });
    // Si después de 8s el root sigue vacío, mostrar la red de seguridad
    setTimeout(function () { window.__bootError('La app tardó demasiado en iniciar (timeout).'); }, 8000);
  </script>
